services:
  upster:
    build: .
    environment:
      UPSTER_PORT: "3377"
      UPSTER_DATA_DIR: /data
      UPSTER_HOST_WORKSPACE: ${UPSTER_HOST_WORKSPACE:-}
      UPSTER_WORKSPACE_ROOTS: /workspaces
      UPSTER_APP_PORT_RANGE: 41000-49151
      UPSTER_METRICS_PORT_RANGE: 52000-60999
      UPSTER_PUBLIC_ORIGIN: https://localhost:3377
      DATABASE_URL: http://db:8080
    ports:
      - "3377:3377"
    volumes:
      - upster_data:/data
      - ${UPSTER_HOST_WORKSPACE:-./workspaces}:/workspaces:rw
    depends_on:
      - db

  db:
    image: ghcr.io/tursodatabase/libsql-server:latest
    volumes:
      - upster_db:/var/lib/sqld

volumes:
  upster_data:
  upster_db:
